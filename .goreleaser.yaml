version: 2

project_name: llmfetch

before:
  hooks:
    - go mod tidy

builds:
  - id: llmfetch
    main: ./cmd/llmfetch
    binary: llmfetch
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    ids:
      - llmfetch
    name_template: >-
      {{ .ProjectName }}-{{ .Version }}-
      {{- if eq .Arch "amd64" }}x86_64{{ else }}aarch64{{ end }}-
      {{- if eq .Os "darwin" }}apple-darwin
      {{- else if eq .Os "windows" }}pc-windows-msvc
      {{- else }}unknown-linux-gnu{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - CHANGELOG.md
      - LICENSE*
      - docs/*.md
      - registry/models.json

checksum:
  name_template: checksums.txt
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
