<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">LLMFetch preview placeholder</title>
  <desc id="desc">A terminal-style SVG placeholder for the LLMFetch README screenshot area.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="55%" stop-color="#10151f"/>
      <stop offset="100%" stop-color="#17121f"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" x2="1">
      <stop offset="0%" stop-color="#28d7ff"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#3ef08a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #8993a5; }
      .white { fill: #eef4ff; }
      .cyan { fill: #38d9ff; }
      .green { fill: #44f26d; }
      .purple { fill: #d66cff; }
      .amber { fill: #ffd166; }
      .red { fill: #ff6b6b; }
      .line { stroke: #2a3447; stroke-width: 1.4; }
      .panel { fill: rgba(8, 12, 24, 0.82); stroke: #334155; stroke-width: 1.2; }
    </style>
  </defs>

  <rect width="1280" height="720" rx="34" fill="url(#bg)"/>
  <circle cx="1110" cy="112" r="180" fill="#20314c" opacity="0.28"/>
  <circle cx="106" cy="622" r="170" fill="#153d35" opacity="0.25"/>
  <rect x="64" y="54" width="1152" height="612" rx="22" fill="#070b12" filter="url(#shadow)"/>
  <rect x="64" y="54" width="1152" height="44" rx="22" fill="#111827"/>
  <rect x="64" y="76" width="1152" height="22" fill="#111827"/>
  <circle cx="94" cy="76" r="7" fill="#ff5f57"/>
  <circle cx="118" cy="76" r="7" fill="#febc2e"/>
  <circle cx="142" cy="76" r="7" fill="#28c840"/>
  <text x="640" y="82" class="sans muted" font-size="14" text-anchor="middle">LLMFetch — AI workstation model fit browser</text>

  <g transform="translate(92 120)">
    <text x="0" y="0" class="mono green" font-size="18" font-weight="700">LLMFetch</text>
    <text x="94" y="0" class="mono muted" font-size="18">AI workstation dashboard</text>
    <rect x="0" y="24" width="1096" height="160" rx="10" class="panel"/>
    <line x1="270" x2="270" y1="24" y2="184" class="line"/>
    <line x1="710" x2="710" y1="24" y2="184" class="line"/>

    <g class="mono" font-size="16" font-weight="700">
      <text x="40" y="58" class="green">       'c.</text>
      <text x="40" y="78" class="green">    ,xNMM.</text>
      <text x="40" y="98" class="cyan">  .OMMMMo</text>
      <text x="40" y="118" class="purple"> XMMMMMMMMMMX.</text>
      <text x="40" y="138" class="red">:MMMMMMMMMMMM:</text>
      <text x="40" y="158" class="amber">  "cooc*" "*coo'"</text>
    </g>

    <text x="292" y="58" class="mono green" font-size="18" font-weight="700">System</text>
    <g class="mono" font-size="16">
      <text x="292" y="84" class="cyan">Host</text><text x="405" y="84" class="white">MacBook Pro</text>
      <text x="292" y="108" class="cyan">CPU</text><text x="405" y="108" class="amber">Apple M3 Max</text>
      <text x="292" y="132" class="cyan">Memory</text><text x="405" y="132" class="white">26.5 GiB / 36.0 GiB </text><text x="592" y="132" class="green">(74%)</text>
      <text x="292" y="156" class="cyan">Display</text><text x="405" y="156" class="white">3024x1964, 1920x1080, 1920x1080</text>
    </g>

    <text x="734" y="58" class="mono green" font-size="18" font-weight="700">AI Stack</text>
    <g class="mono" font-size="16">
      <text x="734" y="84" class="cyan">Runtime</text><text x="850" y="84" class="white">MLX</text><text x="884" y="84" class="red"> × </text><text x="914" y="84" class="white">Ollama</text>
      <text x="734" y="108" class="cyan">Profile</text><text x="850" y="108" class="purple">MLX Powerhouse</text>
      <text x="734" y="132" class="cyan">Registry</text><text x="850" y="132" class="white">500 models</text>
      <text x="734" y="156" class="cyan">AI Score</text><text x="850" y="156" class="green">82</text>
    </g>

    <rect x="0" y="208" width="1096" height="62" rx="8" fill="#0b1220" stroke="#263246"/>
    <text x="18" y="244" class="mono cyan" font-size="17">Search</text>
    <text x="104" y="244" class="mono white" font-size="17">Press / to search...</text>
    <text x="408" y="244" class="mono cyan" font-size="17">Sort</text>
    <text x="470" y="244" class="mono white" font-size="17">Score ↓</text>
    <text x="660" y="244" class="mono cyan" font-size="17">Fit</text>
    <text x="712" y="244" class="mono white" font-size="17">All</text>
    <text x="884" y="244" class="mono cyan" font-size="17">Rows</text>
    <text x="948" y="244" class="mono white" font-size="17">500/500</text>

    <g class="mono" font-size="15" font-weight="700">
      <text x="0" y="304" class="cyan">Rank</text>
      <text x="66" y="304" class="cyan">Model</text>
      <text x="330" y="304" class="cyan">Provider</text>
      <text x="458" y="304" class="cyan">Score</text>
      <text x="548" y="304" class="cyan">Runtime</text>
      <text x="690" y="304" class="cyan">Out tok/s</text>
      <text x="822" y="304" class="cyan">Memory</text>
      <text x="928" y="304" class="cyan">Fit</text>
    </g>
    <line x1="0" x2="1096" y1="318" y2="318" class="line"/>

    <g class="mono" font-size="16" font-weight="700">
      <rect x="0" y="330" width="1096" height="28" fill="#e5edf8"/>
      <text x="0" y="350" fill="#0f172a">1</text>
      <text x="66" y="350" fill="#0f172a">DeepSeek-R1-0528</text>
      <text x="330" y="350" fill="#0f172a">DeepSeek</text>
      <text x="458" y="350" fill="#0f172a">97</text>
      <text x="548" y="350" fill="#0f172a">MLX Native</text>
      <text x="690" y="350" fill="#0f172a">90</text>
      <text x="822" y="350" fill="#0f172a">8GB</text>
      <text x="928" y="350" fill="#0f172a">Best</text>

      <text x="0" y="386" class="green">2</text>
      <text x="66" y="386" class="green">Qwen3-Coder-30B-A3B-Instruct</text>
      <text x="330" y="386" class="cyan">Alibaba</text>
      <text x="458" y="386" class="green">96</text>
      <text x="548" y="386" class="white">MLX Native</text>
      <text x="690" y="386" class="amber">55</text>
      <text x="822" y="386" class="white">24GB</text>
      <text x="928" y="386" class="green">Best</text>

      <text x="0" y="422" class="green">3</text>
      <text x="66" y="422" class="white">Qwen2.5-VL-7B-Instruct</text>
      <text x="330" y="422" class="cyan">Alibaba</text>
      <text x="458" y="422" class="green">96</text>
      <text x="548" y="422" class="white">MLX Native</text>
      <text x="690" y="422" class="amber">90</text>
      <text x="822" y="422" class="white">8GB</text>
      <text x="928" y="422" class="green">Best</text>

      <text x="0" y="458" class="muted">4</text>
      <text x="66" y="458" class="white">Llama-3.3-70B-Instruct-Q4</text>
      <text x="330" y="458" class="cyan">Meta</text>
      <text x="458" y="458" class="amber">90</text>
      <text x="548" y="458" class="white">llama.cpp</text>
      <text x="690" y="458" class="amber">24</text>
      <text x="822" y="458" class="white">42GB</text>
      <text x="928" y="458" class="amber">Near</text>
    </g>

    <rect x="0" y="548" width="1096" height="34" fill="#0b1220" stroke="#263246"/>
    <text x="12" y="570" class="mono green" font-size="15" font-weight="700">NORMAL</text>
    <text x="96" y="570" class="mono white" font-size="15">/:search   f:fit   s:sort   d:detail   ↑↓/j/k:move   q:quit</text>
  </g>

  <rect x="64" y="54" width="1152" height="612" rx="22" fill="none" stroke="url(#bar)" stroke-width="2" opacity="0.6"/>
</svg>
